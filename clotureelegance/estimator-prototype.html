<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MT Clôture Élégance — Estimateur de prix / Price Estimator</title>
<style>
  :root{
    --ink:#1a1a1a; --charcoal:#2b2b2b; --gold:#b8924a; --gold-d:#9a7838;
    --paper:#f7f5f1; --line:#e3ddd2; --white:#fff; --muted:#7a756c; --ok:#2f7d4f; --err:#b23b3b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--paper);line-height:1.5}
  header{background:var(--charcoal);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;font-weight:600;letter-spacing:.5px}
  .brand .mark{width:34px;height:34px;border:2px solid var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700}
  .brand small{display:block;font-weight:400;color:#cfc8bb;font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .htools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .lang button,.btn{cursor:pointer;border:none;font-size:13px;border-radius:6px;padding:8px 12px}
  .lang button{background:transparent;color:#cfc8bb;border:1px solid #4a4a4a}
  .lang button.active{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:600}
  .btn{background:var(--gold);color:#1a1a1a;font-weight:600}
  .btn:hover{background:var(--gold-d);color:#fff}
  .btn.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold)}
  .btn.ghost:hover{background:var(--gold);color:#1a1a1a}
  .btn.sm{padding:6px 10px;font-size:12px}
  .who{font-size:12px;color:#cfc8bb;display:flex;align-items:center;gap:8px}
  main{max-width:1000px;margin:0 auto;padding:26px 18px 60px}
  .view{display:none}
  .view.active{display:block}
  h1{font-size:26px;margin:0 0 4px;font-weight:600}
  .sub{color:var(--muted);margin:0 0 22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:680px){.g2,.g3{grid-template-columns:1fr}}
  label{display:block;font-size:13px;font-weight:600;margin:0 0 5px;color:var(--charcoal)}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);border-color:var(--gold)}
  .help{font-size:12px;color:var(--muted);margin-top:4px}
  .est-box{background:linear-gradient(135deg,#2b2b2b,#3a3a3a);color:#fff;border-radius:12px;padding:24px;text-align:center}
  .est-box .num{font-size:13px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .est-box .range{font-size:34px;font-weight:700;margin:8px 0}
  .est-box .note{font-size:12px;color:#cfc8bb}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  td.r,th.r{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.new{background:#e8f1ec;color:var(--ok)}
  .pill.sent{background:#fdf3e2;color:var(--gold-d)}
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .tabs button{background:#fff;border:1px solid var(--line);padding:9px 15px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--charcoal)}
  .tabs button.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
  .login-wrap{max-width:380px;margin:50px auto}
  .msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
  .msg.ok{background:#e8f1ec;color:var(--ok);display:block}
  .msg.err{background:#fbeaea;color:var(--err);display:block}
  .rowline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .rowline:last-child{border-bottom:none}
  .seed{font-size:12px;color:var(--muted);background:#f0ece4;border-radius:8px;padding:10px 12px;margin-top:14px}
  .config-prod{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
  .config-prod h3{margin:0 0 10px;font-size:16px}
  .ht-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
  .ht-row input{max-width:120px}
  .ht-row .lbl{font-size:13px;min-width:90px}
  .foot{font-size:12px;color:var(--muted);text-align:center;margin-top:30px}
  .inline{display:flex;gap:10px;align-items:center}
  .badge-admin{background:var(--gold);color:#1a1a1a;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="mark">CE</span>
    <div>MT Clôture Élégance<small id="tagline">Estimateur de prix</small></div>
  </div>
  <div class="htools">
    <span class="lang">
      <button id="lang-fr" class="active" onclick="setLang('fr')">FR</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </span>
    <span class="who" id="whoami"></span>
    <button class="btn sm ghost" id="loginBtn" onclick="go('login')"></button>
    <button class="btn sm ghost" id="logoutBtn" style="display:none" onclick="logout()"></button>
  </div>
</header>

<main>
  <!-- ============ PUBLIC / SALES ESTIMATOR ============ -->
  <section id="view-estimator" class="view active">
    <h1 id="t-est-title"></h1>
    <p class="sub" id="t-est-sub"></p>

    <div class="grid g2">
      <div>
        <div class="card">
          <div class="grid">
            <div>
              <label id="l-product"></label>
              <select id="f-product" onchange="renderHeights();calc()"></select>
            </div>
            <div class="grid g2">
              <div>
                <label id="l-height"></label>
                <select id="f-height" onchange="calc()"></select>
              </div>
              <div>
                <label id="l-length"></label>
                <input id="f-length" type="number" min="0" value="100" oninput="calc()">
                <div class="help" id="h-length"></div>
              </div>
            </div>
            <div class="grid g2">
              <div>
                <label id="l-walk"></label>
                <input id="f-walk" type="number" min="0" value="1" oninput="calc()">
              </div>
              <div>
                <label id="l-drive"></label>
                <input id="f-drive" type="number" min="0" value="0" oninput="calc()">
              </div>
            </div>
            <div class="grid g2">
              <div>
                <label id="l-terrain"></label>
                <select id="f-terrain" onchange="calc()">
                  <option value="0" data-fr="Terrain normal / plat" data-en="Normal / flat terrain"></option>
                  <option value="1" data-fr="Terrain en pente / difficile" data-en="Sloped / difficult terrain"></option>
                </select>
              </div>
              <div>
                <label id="l-removal"></label>
                <select id="f-removal" onchange="calc()">
                  <option value="0" data-fr="Non" data-en="No"></option>
                  <option value="1" data-fr="Oui — retirer l'ancienne clôture" data-en="Yes — remove old fence"></option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <label id="l-cust"></label>
          <div class="grid g2" style="margin-top:6px">
            <input id="c-name" placeholder="">
            <input id="c-phone" placeholder="">
          </div>
          <div class="grid g2" style="margin-top:10px">
            <input id="c-email" placeholder="">
            <input id="c-postal" placeholder="">
          </div>
          <textarea id="c-msg" rows="2" placeholder="" style="margin-top:10px"></textarea>
        </div>
      </div>

      <div>
        <div class="est-box">
          <div class="num" id="o-num">CE-2026-____</div>
          <div class="range" id="o-range">—</div>
          <div class="note" id="o-note"></div>
        </div>
        <div class="card" style="margin-top:16px">
          <table>
            <thead><tr><th id="th-item"></th><th class="r" id="th-amt"></th></tr></thead>
            <tbody id="o-lines"></tbody>
          </table>
        </div>
        <button class="btn" style="width:100%" id="btn-send" onclick="sendEstimate()"></button>
        <div class="msg" id="send-msg"></div>
        <div class="seed" id="disclaimer"></div>
      </div>
    </div>
  </section>

  <!-- ============ LOGIN ============ -->
  <section id="view-login" class="view">
    <div class="login-wrap card">
      <h1 id="t-login-title" style="font-size:21px"></h1>
      <p class="sub" id="t-login-sub" style="margin-bottom:16px"></p>
      <label id="l-email"></label>
      <input id="li-email" type="email" autocomplete="username">
      <label id="l-pass" style="margin-top:12px"></label>
      <input id="li-pass" type="password" autocomplete="current-password">
      <button class="btn" style="width:100%;margin-top:16px" id="btn-dologin" onclick="doLogin()"></button>
      <div class="msg" id="login-msg"></div>
      <div class="seed" id="login-hint"></div>
    </div>
  </section>

  <!-- ============ DASHBOARD (sales + admin) ============ -->
  <section id="view-dash" class="view">
    <h1 id="t-dash-title"></h1>
    <p class="sub" id="t-dash-sub"></p>
    <div class="tabs" id="dash-tabs">
      <button class="active" data-tab="estimates" onclick="setTab('estimates')"></button>
      <button data-tab="config" onclick="setTab('config')" id="tab-config-btn"></button>
      <button data-tab="users" onclick="setTab('users')" id="tab-users-btn"></button>
    </div>

    <!-- estimates list -->
    <div id="tab-estimates">
      <div class="card">
        <div class="inline" style="justify-content:space-between;margin-bottom:10px">
          <strong id="est-list-h"></strong>
          <button class="btn sm" onclick="go('estimator')" id="btn-new-est"></button>
        </div>
        <table>
          <thead><tr>
            <th id="th-no"></th><th id="th-cust"></th><th id="th-prod"></th>
            <th class="r" id="th-range"></th><th id="th-by"></th><th id="th-status"></th>
          </tr></thead>
          <tbody id="est-rows"></tbody>
        </table>
      </div>
    </div>

    <!-- config (admin only) -->
    <div id="tab-config" style="display:none">
      <div class="card">
        <strong id="cfg-h"></strong>
        <p class="help" id="cfg-help"></p>
        <div id="cfg-products"></div>
        <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
        <strong id="cfg-extras-h"></strong>
        <div class="grid g3" style="margin-top:10px">
          <div><label id="lc-walk"></label><input id="cfg-walk" type="number"></div>
          <div><label id="lc-drive"></label><input id="cfg-drive" type="number"></div>
          <div><label id="lc-removal"></label><input id="cfg-removal" type="number"></div>
          <div><label id="lc-slope"></label><input id="cfg-slope" type="number"></div>
          <div><label id="lc-range"></label><input id="cfg-range" type="number"></div>
          <div><label id="lc-min"></label><input id="cfg-min" type="number"></div>
        </div>
        <button class="btn" style="margin-top:16px" onclick="saveConfig()" id="btn-savecfg"></button>
        <div class="msg" id="cfg-msg"></div>
      </div>
    </div>

    <!-- users (admin only) -->
    <div id="tab-users" style="display:none">
      <div class="card">
        <strong id="usr-h"></strong>
        <p class="help" id="usr-help"></p>
        <table>
          <thead><tr><th id="th-uemail"></th><th id="th-urole"></th></tr></thead>
          <tbody id="usr-rows"></tbody>
        </table>
        <div class="grid g3" style="margin-top:14px;align-items:end">
          <div><label id="lu-email"></label><input id="nu-email" placeholder="nom@clotureelegance.com"></div>
          <div><label id="lu-role"></label><select id="nu-role">
            <option value="sales" data-fr="Vendeur" data-en="Salesperson"></option>
            <option value="admin" data-fr="Administrateur" data-en="Admin"></option>
          </select></div>
          <div><button class="btn" onclick="addUser()" id="btn-adduser"></button></div>
        </div>
        <div class="msg" id="usr-msg"></div>
      </div>
    </div>
  </section>

  <div class="foot" id="footer"></div>
</main>

<script>
/* ---------------- i18n ---------------- */
const T = {
  tagline:{fr:"Estimateur de prix",en:"Price Estimator"},
  loginBtn:{fr:"Connexion",en:"Log in"},
  logoutBtn:{fr:"Déconnexion",en:"Log out"},
  estTitle:{fr:"Estimateur de clôture",en:"Fence Estimator"},
  estSub:{fr:"Obtenez une estimation instantanée pour votre projet de clôture à Laval, Montréal et les environs.",en:"Get an instant ballpark estimate for your fence project in Laval, Montréal and surrounding areas."},
  product:{fr:"Type de clôture",en:"Fence type"},
  height:{fr:"Hauteur",en:"Height"},
  length:{fr:"Longueur (pieds)",en:"Length (feet)"},
  lengthHelp:{fr:"Longueur totale linéaire à clôturer.",en:"Total linear length to fence."},
  walk:{fr:"Barrières piétonnes (nb)",en:"Walk gates (qty)"},
  drive:{fr:"Barrières doubles / accès (nb)",en:"Double / drive gates (qty)"},
  terrain:{fr:"Terrain",en:"Terrain"},
  removal:{fr:"Retrait d'une ancienne clôture",en:"Remove existing fence"},
  cust:{fr:"Vos coordonnées",en:"Your contact details"},
  cName:{fr:"Nom complet",en:"Full name"},
  cPhone:{fr:"Téléphone",en:"Phone"},
  cEmail:{fr:"Courriel",en:"Email"},
  cPostal:{fr:"Code postal / ville",en:"Postal code / city"},
  cMsg:{fr:"Détails du projet (optionnel)",en:"Project details (optional)"},
  thItem:{fr:"Détail",en:"Item"},
  thAmt:{fr:"Montant",en:"Amount"},
  oNote:{fr:"Estimation approximative — à confirmer par notre équipe.",en:"Ballpark estimate — to be confirmed by our team."},
  btnSend:{fr:"Envoyer cette estimation à l'entreprise",en:"Send this estimate to the company"},
  disclaimer:{fr:"Ceci est une estimation indicative basée sur les informations fournies. Le prix final sera confirmé après une visite ou une évaluation détaillée. Numéro d'estimation à conserver pour votre dossier.",en:"This is an indicative estimate based on the information provided. The final price is confirmed after a site visit or detailed assessment. Keep your estimate number for reference."},
  loginTitle:{fr:"Connexion à l'espace équipe",en:"Team area login"},
  loginSub:{fr:"Réservé aux vendeurs et administrateurs.",en:"For salespeople and admins only."},
  email:{fr:"Courriel",en:"Email"},
  pass:{fr:"Mot de passe",en:"Password"},
  doLogin:{fr:"Se connecter",en:"Sign in"},
  loginHint:{fr:"Démo — Admin: marknovak77@gmail.com / admin  •  Vendeur: vendeur@clotureelegance.com / vente",en:"Demo — Admin: marknovak77@gmail.com / admin  •  Sales: vendeur@clotureelegance.com / vente"},
  dashTitle:{fr:"Tableau de bord",en:"Dashboard"},
  dashSubSales:{fr:"Vos estimations et nouveaux devis.",en:"Your estimates and new quotes."},
  dashSubAdmin:{fr:"Toutes les estimations, tarifs et utilisateurs.",en:"All estimates, pricing and users."},
  tabEst:{fr:"Estimations",en:"Estimates"},
  tabCfg:{fr:"Tarifs (config)",en:"Pricing (config)"},
  tabUsers:{fr:"Utilisateurs",en:"Users"},
  estListH:{fr:"Estimations",en:"Estimates"},
  btnNew:{fr:"+ Nouvelle estimation",en:"+ New estimate"},
  thNo:{fr:"N°",en:"No."},
  thCust:{fr:"Client",en:"Customer"},
  thProd:{fr:"Produit",en:"Product"},
  thRange:{fr:"Fourchette",en:"Range"},
  thBy:{fr:"Par",en:"By"},
  thStatus:{fr:"Statut",en:"Status"},
  cfgH:{fr:"Tarifs par type de clôture",en:"Pricing by fence type"},
  cfgHelp:{fr:"Prix installé par pied linéaire, par hauteur. Modifiable à tout moment.",en:"Installed price per linear foot, by height. Editable anytime."},
  cfgExtrasH:{fr:"Suppléments et réglages",en:"Add-ons & settings"},
  lcWalk:{fr:"Barrière piétonne ($)",en:"Walk gate ($)"},
  lcDrive:{fr:"Barrière double ($)",en:"Double gate ($)"},
  lcRemoval:{fr:"Retrait ($/pied)",en:"Removal ($/ft)"},
  lcSlope:{fr:"Supplément pente (%)",en:"Slope surcharge (%)"},
  lcRange:{fr:"Largeur fourchette (±%)",en:"Range spread (±%)"},
  lcMin:{fr:"Projet minimum ($)",en:"Minimum project ($)"},
  btnSaveCfg:{fr:"Enregistrer les tarifs",en:"Save pricing"},
  usrH:{fr:"Utilisateurs",en:"Users"},
  usrHelp:{fr:"Comptes pouvant se connecter. (Dans la version réelle, un courriel d'invitation est envoyé.)",en:"Accounts that can log in. (In the live version an invite email is sent.)"},
  thUEmail:{fr:"Courriel",en:"Email"},
  thURole:{fr:"Rôle",en:"Role"},
  luEmail:{fr:"Nouveau courriel",en:"New email"},
  luRole:{fr:"Rôle",en:"Role"},
  btnAddUser:{fr:"Ajouter",en:"Add"},
  ratePer:{fr:"$/pied",en:"$/ft"},
  footer:{fr:"Prototype — MT Clôture Élégance · (438) 221-5352 · clotureelegance@outlook.com",en:"Prototype — MT Clôture Élégance · (438) 221-5352 · clotureelegance@outlook.com"}
};
let lang='fr';

/* ---------------- data (in-memory) ---------------- */
let config = {
  products:[
    {id:'alu', name:{fr:"Clôture ornementale en aluminium",en:"Aluminum ornamental fence"},
     heights:[{ft:4,rate:55},{ft:5,rate:65},{ft:6,rate:75}]},
    {id:'glass', name:{fr:"Clôture en verre (Spego)",en:"Glass fence (Spego)"},
     heights:[{ft:3.5,rate:130},{ft:4,rate:145}]},
    {id:'comp', name:{fr:"Clôture composite (fibre de bois)",en:"Composite (fiberwood) fence"},
     heights:[{ft:6,rate:68},{ft:8,rate:82}]},
    {id:'chain', name:{fr:"Clôture à mailles de chaîne (frost)",en:"Chain-link fence (frost)"},
     heights:[{ft:4,rate:26},{ft:5,rate:30},{ft:6,rate:35},{ft:8,rate:48}]}
  ],
  walkGate:450, driveGate:1200, removalPerFt:6, slopePct:12, rangePct:15, minProject:1500
};
let users=[
  {email:"marknovak77@gmail.com",role:"admin",pass:"admin"},
  {email:"vendeur@clotureelegance.com",role:"sales",pass:"vente"}
];
let estimates=[
  {no:"CE-2026-0007",cust:"Jean Tremblay",prodId:"alu",low:6200,high:8400,by:"vendeur@clotureelegance.com",status:"sent"},
  {no:"CE-2026-0008",cust:"S. Gagnon",prodId:"glass",low:14800,high:20000,by:"public",status:"new"}
];
let seq=8;
let session=null; // {email, role}
let lastEstimate=null;

/* ---------------- helpers ---------------- */
function tx(){ // apply all static translations
  for(const k in T){ const el=document.getElementById(mapId(k)); }
  setText('tagline','tagline');setText('loginBtn','loginBtn');setText('logoutBtn','logoutBtn');
  setText('t-est-title','estTitle');setText('t-est-sub','estSub');
  setText('l-product','product');setText('l-height','height');setText('l-length','length');
  setText('h-length','lengthHelp');setText('l-walk','walk');setText('l-drive','drive');
  setText('l-terrain','terrain');setText('l-removal','removal');setText('l-cust','cust');
  setText('th-item','thItem');setText('th-amt','thAmt');setText('o-note','oNote');
  setText('btn-send','btnSend');setText('disclaimer','disclaimer');
  setText('t-login-title','loginTitle');setText('t-login-sub','loginSub');
  setText('l-email','email');setText('l-pass','pass');setText('btn-dologin','doLogin');
  setText('login-hint','loginHint');setText('t-dash-title','dashTitle');
  setText('est-list-h','estListH');setText('btn-new-est','btnNew');
  setText('th-no','thNo');setText('th-cust','thCust');setText('th-prod','thProd');
  setText('th-range','thRange');setText('th-by','thBy');setText('th-status','thStatus');
  setText('cfg-h','cfgH');setText('cfg-help','cfgHelp');setText('cfg-extras-h','cfgExtrasH');
  setText('lc-walk','lcWalk');setText('lc-drive','lcDrive');setText('lc-removal','lcRemoval');
  setText('lc-slope','lcSlope');setText('lc-range','lcRange');setText('lc-min','lcMin');
  setText('btn-savecfg','btnSaveCfg');setText('usr-h','usrH');setText('usr-help','usrHelp');
  setText('th-uemail','thUEmail');setText('th-urole','thURole');setText('lu-email','luEmail');
  setText('lu-role','luRole');setText('btn-adduser','btnAddUser');setText('footer','footer');
  // tabs
  document.querySelector('[data-tab=estimates]').textContent=T.tabEst[lang];
  document.getElementById('tab-config-btn').textContent=T.tabCfg[lang];
  document.getElementById('tab-users-btn').textContent=T.tabUsers[lang];
  // placeholders
  ph('c-name','cName');ph('c-phone','cPhone');ph('c-email','cEmail');ph('c-postal','cPostal');ph('c-msg','cMsg');
  // data-fr/en options
  document.querySelectorAll('[data-fr]').forEach(o=>{o.textContent=o.getAttribute('data-'+lang);});
}
function mapId(k){return k;}
function setText(id,key){const el=document.getElementById(id);if(el&&T[key])el.textContent=T[key][lang];}
function ph(id,key){const el=document.getElementById(id);if(el&&T[key])el.placeholder=T[key][lang];}
function money(n){return new Intl.NumberFormat(lang==='fr'?'fr-CA':'en-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(n);}

function setLang(l){lang=l;document.documentElement.lang=l;
  document.getElementById('lang-fr').classList.toggle('active',l==='fr');
  document.getElementById('lang-en').classList.toggle('active',l==='en');
  tx();renderProducts();renderHeights();calc();renderDash();renderConfig();
}

/* ---------------- nav ---------------- */
function go(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='dash'){renderDash();renderConfig();renderUsers();}
  window.scrollTo(0,0);
}
function refreshAuthUI(){
  const w=document.getElementById('whoami');
  if(session){
    w.innerHTML=session.email+' '+(session.role==='admin'?'<span class="badge-admin">ADMIN</span>':'<span class="badge-admin" style="background:#4a4a4a;color:#fff">'+(lang==='fr'?'VENTE':'SALES')+'</span>');
    document.getElementById('loginBtn').style.display='none';
    document.getElementById('logoutBtn').style.display='';
  }else{
    w.textContent='';
    document.getElementById('loginBtn').style.display='';
    document.getElementById('logoutBtn').style.display='none';
  }
}

/* ---------------- estimator ---------------- */
function renderProducts(){
  const sel=document.getElementById('f-product');const cur=sel.value;
  sel.innerHTML='';
  config.products.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name[lang];sel.appendChild(o);});
  if(cur)sel.value=cur;
}
function renderHeights(){
  const p=config.products.find(x=>x.id===document.getElementById('f-product').value)||config.products[0];
  const sel=document.getElementById('f-height');const cur=sel.value;sel.innerHTML='';
  p.heights.forEach(h=>{const o=document.createElement('option');o.value=h.ft;o.textContent=h.ft+(lang==='fr'?' pi':' ft')+' — '+money(h.rate)+'/'+(lang==='fr'?'pi':'ft');sel.appendChild(o);});
  if(cur&&[...sel.options].some(o=>o.value===cur))sel.value=cur;
}
function curRate(){
  const p=config.products.find(x=>x.id===document.getElementById('f-product').value);
  const ft=parseFloat(document.getElementById('f-height').value);
  const h=p.heights.find(x=>x.ft===ft)||p.heights[0];return {p,rate:h.rate};
}
function calc(){
  const len=Math.max(0,parseFloat(document.getElementById('f-length').value)||0);
  const walk=Math.max(0,parseInt(document.getElementById('f-walk').value)||0);
  const drive=Math.max(0,parseInt(document.getElementById('f-drive').value)||0);
  const slope=document.getElementById('f-terrain').value==='1';
  const removal=document.getElementById('f-removal').value==='1';
  const {p,rate}=curRate();
  const base=len*rate;
  const slopeAdd=slope?base*config.slopePct/100:0;
  const gateAdd=walk*config.walkGate+drive*config.driveGate;
  const remAdd=removal?len*config.removalPerFt:0;
  let sub=base+slopeAdd+gateAdd+remAdd;
  sub=Math.max(sub,config.minProject);
  const low=Math.round(sub*(1-config.rangePct/100)/50)*50;
  const high=Math.round(sub*(1+config.rangePct/100)/50)*50;
  // lines
  const L=document.getElementById('o-lines');L.innerHTML='';
  const add=(name,val)=>{L.insertAdjacentHTML('beforeend',`<tr><td>${name}</td><td class="r">${val}</td></tr>`);};
  add((lang==='fr'?'Clôture':'Fence')+` — ${len} ${lang==='fr'?'pi':'ft'} × ${money(rate)}`,money(base));
  if(slopeAdd)add((lang==='fr'?'Supplément terrain en pente':'Sloped terrain surcharge')+` (${config.slopePct}%)`,money(slopeAdd));
  if(gateAdd){if(walk)add((lang==='fr'?'Barrières piétonnes':'Walk gates')+` ×${walk}`,money(walk*config.walkGate));if(drive)add((lang==='fr'?'Barrières doubles':'Double gates')+` ×${drive}`,money(drive*config.driveGate));}
  if(remAdd)add((lang==='fr'?'Retrait ancienne clôture':'Old fence removal'),money(remAdd));
  document.getElementById('o-range').textContent=money(low)+' – '+money(high);
  document.getElementById('o-num').textContent='CE-2026-'+String(seq+1).padStart(4,'0');
  lastEstimate={prodId:p.id,prodName:p.name[lang],low,high,len};
}

function sendEstimate(){
  const name=document.getElementById('c-name').value.trim();
  const email=document.getElementById('c-email').value.trim();
  const m=document.getElementById('send-msg');
  if(!name||!email){m.className='msg err';m.textContent=lang==='fr'?"Veuillez entrer votre nom et courriel.":"Please enter your name and email.";return;}
  seq++;const no='CE-2026-'+String(seq).padStart(4,'0');
  estimates.unshift({no,cust:name,prodId:lastEstimate.prodId,low:lastEstimate.low,high:lastEstimate.high,by:session?session.email:'public',status:'sent'});
  m.className='msg ok';
  m.innerHTML=(lang==='fr'
    ?`Estimation <b>${no}</b> enregistrée et prête à envoyer. `
    :`Estimate <b>${no}</b> saved and ready to send. `)+
    `<a href="${mailtoLink(no,name,email)}">${lang==='fr'?'Ouvrir le courriel':'Open email'}</a>`;
  document.getElementById('o-num').textContent=no;
}
function mailtoLink(no,name,email){
  const subj=encodeURIComponent(`${lang==='fr'?'Estimation':'Estimate'} ${no} — ${name}`);
  const body=encodeURIComponent(
    `${lang==='fr'?'Numéro':'Number'}: ${no}\n`+
    `${lang==='fr'?'Client':'Customer'}: ${name} (${email})\n`+
    `${lang==='fr'?'Produit':'Product'}: ${lastEstimate.prodName}\n`+
    `${lang==='fr'?'Fourchette':'Range'}: ${money(lastEstimate.low)} – ${money(lastEstimate.high)}\n`);
  return `mailto:clotureelegance@outlook.com?subject=${subj}&body=${body}`;
}

/* ---------------- auth ---------------- */
function doLogin(){
  const e=document.getElementById('li-email').value.trim().toLowerCase();
  const p=document.getElementById('li-pass').value;
  const u=users.find(x=>x.email.toLowerCase()===e&&x.pass===p);
  const m=document.getElementById('login-msg');
  if(!u){m.className='msg err';m.textContent=lang==='fr'?"Identifiants invalides.":"Invalid credentials.";return;}
  session={email:u.email,role:u.role};m.className='msg';m.textContent='';
  refreshAuthUI();go('dash');
}
function logout(){session=null;refreshAuthUI();go('estimator');}

/* ---------------- dashboard ---------------- */
function setTab(t){
  document.querySelectorAll('#dash-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('tab-estimates').style.display=t==='estimates'?'':'none';
  document.getElementById('tab-config').style.display=t==='config'?'':'none';
  document.getElementById('tab-users').style.display=t==='users'?'':'none';
}
function renderDash(){
  if(!session)return;
  document.getElementById('t-dash-sub').textContent=session.role==='admin'?T.dashSubAdmin[lang]:T.dashSubSales[lang];
  const adminOnly=session.role==='admin';
  document.getElementById('tab-config-btn').style.display=adminOnly?'':'none';
  document.getElementById('tab-users-btn').style.display=adminOnly?'':'none';
  if(!adminOnly)setTab('estimates');
  const rows=document.getElementById('est-rows');rows.innerHTML='';
  const list=session.role==='admin'?estimates:estimates.filter(e=>e.by===session.email);
  if(!list.length)rows.innerHTML=`<tr><td colspan="6" style="color:var(--muted)">${lang==='fr'?'Aucune estimation.':'No estimates yet.'}</td></tr>`;
  list.forEach(e=>{
    const pr=config.products.find(p=>p.id===e.prodId);
    rows.insertAdjacentHTML('beforeend',
      `<tr><td><b>${e.no}</b></td><td>${e.cust}</td><td>${pr?pr.name[lang]:e.prodId}</td>
       <td class="r">${money(e.low)} – ${money(e.high)}</td><td>${e.by==='public'?(lang==='fr'?'Site web':'Website'):e.by.split('@')[0]}</td>
       <td><span class="pill ${e.status}">${e.status==='sent'?(lang==='fr'?'Envoyée':'Sent'):(lang==='fr'?'Nouvelle':'New')}</span></td></tr>`);
  });
}
function renderConfig(){
  const wrap=document.getElementById('cfg-products');if(!wrap)return;wrap.innerHTML='';
  config.products.forEach((p,pi)=>{
    let html=`<div class="config-prod"><h3>${p.name[lang]}</h3>`;
    p.heights.forEach((h,hi)=>{
      html+=`<div class="ht-row"><span class="lbl">${h.ft} ${lang==='fr'?'pi':'ft'}</span>
        <input type="number" value="${h.rate}" onchange="config.products[${pi}].heights[${hi}].rate=parseFloat(this.value)||0">
        <span class="help">${T.ratePer[lang]}</span></div>`;
    });
    html+=`</div>`;wrap.insertAdjacentHTML('beforeend',html);
  });
  document.getElementById('cfg-walk').value=config.walkGate;
  document.getElementById('cfg-drive').value=config.driveGate;
  document.getElementById('cfg-removal').value=config.removalPerFt;
  document.getElementById('cfg-slope').value=config.slopePct;
  document.getElementById('cfg-range').value=config.rangePct;
  document.getElementById('cfg-min').value=config.minProject;
}
function saveConfig(){
  config.walkGate=parseFloat(document.getElementById('cfg-walk').value)||0;
  config.driveGate=parseFloat(document.getElementById('cfg-drive').value)||0;
  config.removalPerFt=parseFloat(document.getElementById('cfg-removal').value)||0;
  config.slopePct=parseFloat(document.getElementById('cfg-slope').value)||0;
  config.rangePct=parseFloat(document.getElementById('cfg-range').value)||0;
  config.minProject=parseFloat(document.getElementById('cfg-min').value)||0;
  const m=document.getElementById('cfg-msg');m.className='msg ok';
  m.textContent=lang==='fr'?'Tarifs enregistrés. Les nouvelles estimations utilisent ces prix.':'Pricing saved. New estimates use these prices.';
  renderHeights();calc();
}
function renderUsers(){
  const rows=document.getElementById('usr-rows');if(!rows)return;rows.innerHTML='';
  users.forEach(u=>rows.insertAdjacentHTML('beforeend',
    `<tr><td>${u.email}</td><td>${u.role==='admin'?(lang==='fr'?'Administrateur':'Admin'):(lang==='fr'?'Vendeur':'Salesperson')}</td></tr>`));
}
function addUser(){
  const e=document.getElementById('nu-email').value.trim().toLowerCase();
  const r=document.getElementById('nu-role').value;const m=document.getElementById('usr-msg');
  if(!e||!e.includes('@')){m.className='msg err';m.textContent=lang==='fr'?'Courriel invalide.':'Invalid email.';return;}
  if(users.some(u=>u.email.toLowerCase()===e)){m.className='msg err';m.textContent=lang==='fr'?'Cet utilisateur existe déjà.':'User already exists.';return;}
  users.push({email:e,role:r,pass:'demo'});document.getElementById('nu-email').value='';
  m.className='msg ok';m.textContent=lang==='fr'?'Utilisateur ajouté (mot de passe démo: demo).':'User added (demo password: demo).';
  renderUsers();
}

/* ---------------- init ---------------- */
tx();renderProducts();renderHeights();calc();refreshAuthUI();
</script>
